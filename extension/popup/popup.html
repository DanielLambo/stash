<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stash</title>
  <link rel="stylesheet" href="../lib/theme.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app" class="popup">
    <!-- Header -->
    <header class="hdr">
      <div class="hdr-left">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="6" y="3" width="12" height="4" rx="1.5" fill="currentColor" opacity="0.85"/>
            <rect x="3" y="6" width="18" height="15" rx="3.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <line x1="7" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
            <line x1="7" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>
          </svg>
        </div>
        <div class="hdr-title">
          <div class="title">Stash</div>
          <div class="hdr-lines">
            <span class="hdr-tagline">Clipboard history</span>
            <div class="subtitle" id="status">Ready</div>
          </div>
        </div>
      </div>
      <div class="hdr-right">
        <button class="icon-btn" id="btn-paste" title="Capture current clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-row">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search" placeholder="Search clipboard" autocomplete="off" spellcheck="false" />
        <kbd class="kbd-hint">⌘K</kbd>
      </div>
    </div>

    <!-- Filter pills -->
    <div class="pills" id="pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="text">Text</button>
      <button class="pill" data-filter="link">Links</button>
      <button class="pill" data-filter="image">Images</button>
      <button class="pill" data-filter="color">Colors</button>
      <button class="pill" data-filter="code">Code</button>
      <button class="pill" data-filter="pinned">Pinned</button>
    </div>

    <!-- List -->
    <main id="list" class="list" role="list"></main>

    <!-- Empty state -->
    <div id="empty" class="empty hidden">
      <div class="empty-art" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none">
          <rect x="14" y="6" width="36" height="10" rx="3" fill="currentColor" opacity="0.15"/>
          <rect x="8" y="14" width="48" height="44" rx="9" stroke="currentColor" stroke-width="2" fill="none"/>
          <line x1="16" y1="28" x2="48" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
          <line x1="16" y1="38" x2="40" y2="38" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
          <line x1="16" y1="48" x2="32" y2="48" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
        </svg>
      </div>
      <div class="empty-title" id="empty-title">Nothing copied yet</div>
      <div class="empty-sub" id="empty-sub">Press ⌘C anywhere — your last <span id="empty-count">5</span> copies appear here.</div>
    </div>

    <!-- Footer -->
    <footer class="ftr">
      <div class="ftr-stat" id="ftr-stat">0 items</div>
      <div class="ftr-actions">
        <button class="btn ghost danger" id="btn-clear">Clear</button>
        <button class="btn ghost" id="btn-sync" title="Sync now">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
            <path d="M21 12a9 9 0 1 1-3-6.7"/>
            <polyline points="21 4 21 9 16 9"/>
          </svg>
          Sync
        </button>
      </div>
    </footer>

    <!-- Vault unlock overlay -->
    <div id="vault-unlock" class="vault-overlay hidden">
      <div class="vault-card glass">
        <div class="vault-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </div>
        <div class="vault-title">Unlock vault</div>
        <div class="vault-sub">Enter your master password to reveal protected items.</div>
        <input id="vault-pass" type="password" placeholder="Master password" autocomplete="off" />
        <div id="vault-err" class="vault-err"></div>
        <div class="vault-actions">
          <button class="btn" id="vault-cancel">Cancel</button>
          <button class="btn primary" id="vault-submit">Unlock</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Expand modal -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card glass">
        <header class="modal-hdr">
          <div class="modal-type" id="modal-type"></div>
          <button class="icon-btn" id="modal-close" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </header>
        <div class="modal-body" id="modal-body"></div>
        <footer class="modal-ftr">
          <div class="modal-meta" id="modal-meta"></div>
          <div class="modal-actions">
            <button class="btn" id="modal-edit">Edit</button>
            <button class="btn primary" id="modal-copy">Copy</button>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
